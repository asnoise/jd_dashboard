<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonom Digital</title>
    
    <!-- 1. Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- 2. OneSignal Push Notifications -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({ appId: "06e57f00-4041-47e9-b1d2-39fe6be09395" });
      });
    </script>
    
    <!-- 3. CSS Styling -->
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; margin: 0; padding: 0; color: #333; }
        .navbar { background-color: #004aad; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .navbar h1 { margin: 0; font-size: 22px; }
        .btn-logout { background-color: #ff4757; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .container { max-width: 1000px; margin: 30px auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .auth-container { max-width: 400px; }
        h2 { color: #004aad; margin-top: 0; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; }
        label { font-weight: bold; font-size: 13px; color: #555; display: block; margin-bottom: 5px; margin-top: 15px;}
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; background: #fafafa; }
        input[type="file"] { border: 1px dashed #004aad; background: #f9fbff; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; margin-top: 15px;}
        .btn-blue { background-color: #004aad; }
        .btn-green { background-color: #2ed573; }
        .btn-gray { background-color: #a4b0be; width: auto; padding: 10px 20px;}
        .toggle-text { text-align: center; color: #004aad; margin-top: 15px; cursor: pointer; font-weight: bold; }
        .song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .song-card { border: 1px solid #eee; border-radius: 8px; padding: 15px; text-align: center; background: #fff;}
        .song-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; margin-bottom: 10px;}
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; color: white; display: inline-block; margin-top: 5px;}
        .badge-pending { background: #ffa502; }
        .badge-approved { background: #2ed573; }
        .badge-rejected { background: #ff4757; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #f0f2f5; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h1>Jonom Digital</h1>
        <div id="navMenu" style="display: none;">
            <span id="welcomeText" style="margin-right: 15px;"></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- 1. AUTHENTICATION SECTION -->
    <div id="authSection" class="container auth-container" style="display: block;">
        <h2 id="authTitle" style="text-align:center;">Login to Jonom</h2>
        
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@email.com">
        
        <label>Password (Min 6 chars)</label>
        <input type="password" id="password" placeholder="******">
        
        <div id="signupFields" style="display: none;">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Legal Name">
            
            <label>Stage Name</label>
            <input type="text" id="stageName" placeholder="Artist Name">
        </div>

        <button id="loginBtn" class="btn btn-blue" style="display: block;" onclick="login()">Login</button>
        <button id="signupBtn" class="btn btn-green" style="display: none;" onclick="signup()">Create Account</button>
        
        <div id="toggleText" class="toggle-text" onclick="toggleAuth()">Need an account? Sign Up</div>
    </div>

    <!-- 2. USER DASHBOARD -->
    <div id="userDashboard" class="container" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>My Releases</h2>
            <button class="btn-logout" style="background:#2ed573;" onclick="showSection('uploadSection')">+ Upload</button>
        </div>
        <div id="songList" class="song-grid"></div>
    </div>

    <!-- 3. UPLOAD FORM -->
    <div id="uploadSection" class="container" style="display: none;">
        <h2>Upload New Release</h2>
        <div class="form-grid">
            <div><label>Type</label><select id="rType"><option>Single</option><option>Album</option></select></div>
            <div><label>Explicit</label><select id="rExp"><option>No</option><option>Yes</option></select></div>
            <div class="full-width"><label>Title</label><input type="text" id="rTitle"></div>
            <div><label>Artwork (JPG/PNG)</label><input type="file" id="rArt" accept="image/*"></div>
            <div><label>Audio (.WAV)</label><input type="file" id="rAudio" accept=".wav"></div>
        </div>
        <div style="margin-top: 20px; text-align: right;">
            <button class="btn btn-gray" onclick="showSection('userDashboard')">Cancel</button>
            <button class="btn btn-blue" style="width:auto; padding: 10px 20px; margin-left: 10px;" onclick="submitRelease()">Submit</button>
        </div>
    </div>

    <!-- 4. ADMIN DASHBOARD -->
    <div id="adminDashboard" class="container" style="display: none;">
        <h2 style="color: #ff4757;">Admin Control Panel</h2>
        <table>
            <thead><tr><th>Title</th><th>Artist</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="adminSongList"></tbody>
        </table>
    </div>

    <!-- MAIN JAVASCRIPT -->
    <script>
        // Supabase Initialization
        const SUPABASE_URL = 'https://axwgpsqmlvbwualrixrg.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4d2dwc3FtbHZid3VhbHJpeHJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTc3ODQsImV4cCI6MjA5NDE3Mzc4NH0.bp9zIabDA5DBUiMmSgVpB2qO4mM5P1TMbBIo1YKVcCI'; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let currentProfile = null;

        // UI Functions
        function showSection(sectionId) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('userDashboard').style.display = 'none';
            document.getElementById('uploadSection').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'none';
            document.getElementById(sectionId).style.display = 'block';
        }

        function toggleAuth() {
            var signupFields = document.getElementById("signupFields");
            var loginBtn = document.getElementById("loginBtn");
            var signupBtn = document.getElementById("signupBtn");
            var toggleText = document.getElementById("toggleText");
            var authTitle = document.getElementById("authTitle");

            if (signupFields.style.display === "none") {
                signupFields.style.display = "block";
                signupBtn.style.display = "block";
                loginBtn.style.display = "none";
                toggleText.innerHTML = "Already have an account? Login";
                authTitle.innerHTML = "Create Account";
            } else {
                signupFields.style.display = "none";
                signupBtn.style.display = "none";
                loginBtn.style.display = "block";
                toggleText.innerHTML = "Need an account? Sign Up";
                authTitle.innerHTML = "Login to Jonom";
            }
        }

        // --- CORE AUTH LOGIC ---
        async function signup() {
            alert("Button Clicked: Checking inputs..."); // Added to check if button works

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value;
            const stageName = document.getElementById('stageName').value;

            if (!email || !password || !fullName || !stageName) {
                alert("Error: Please fill in all fields."); return;
            }
            if (password.length < 6) {
                alert("Error: Password must be at least 6 characters."); return;
            }

            alert("Sending data to Supabase..."); // Check if it gets past validation

            const { data, error } = await supabase.auth.signUp({ email, password });
            
            if (error) { 
                alert("Supabase Auth Error: " + error.message); 
                return; 
            }

            if (data.user) {
                const { error: profileError } = await supabase.from('profiles').insert([{ 
                    id: data.user.id, full_name: fullName, stage_name: stageName, role: 'artist' 
                }]);

                if (profileError) {
                    alert("Profile Table Error: " + profileError.message + " (Check RLS settings in Supabase)");
                } else {
                    alert("Signup Successful! Switching to Login view.");
                    document.getElementById('password').value = ""; 
                    toggleAuth(); 
                }
            }
        }

        async function login() {
            alert("Button Clicked: Starting Login..."); // Check if button works

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) { 
                alert("Error: Enter email and password."); return; 
            }

            const { error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) { 
                alert("Supabase Login Error: " + error.message); return; 
            }
            
            alert("Login success! Loading dashboard...");
            checkSession();
        }

        async function logout() {
            await supabase.auth.signOut();
            location.reload();
        }

        // --- SESSION LOGIC ---
        async function checkSession() {
            const { data: { user } } = await supabase.auth.getUser();
            
            if (user) {
                currentUser = user;
                const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                currentProfile = profile;

                document.getElementById('navMenu').style.display = 'flex';
                
                if(profile) {
                    document.getElementById('welcomeText').innerText = "Welcome, " + profile.stage_name;
                    if (profile.role === 'admin') {
                        showSection('adminDashboard');
                    } else {
                        showSection('userDashboard');
                    }
                } else {
                    alert("Logged in but no profile found.");
                    showSection('userDashboard');
                }
            } else {
                showSection('authSection');
            }
        }

        window.onload = checkSession;
    </script>
</body>
</html>
