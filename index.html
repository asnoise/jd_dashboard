<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jonom Digital</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #004aad; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #004aad; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        a { color: #004aad; text-decoration: none; font-weight: bold; display: block; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Login to Jonom</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <a href="signup.html">Need an account? Sign Up Here</a>
    </div>

    <script>
        const supabase = window.supabase.createClient('https://axwgpsqmlvbwualrixrg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4d2dwc3FtbHZid3VhbHJpeHJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTc3ODQsImV4cCI6MjA5NDE3Mzc4NH0.bp9zIabDA5DBUiMmSgVpB2qO4mM5P1TMbBIo1YKVcCI');

        // Check if already logged in
        window.onload = async function() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) window.location.href = "dashboard.html";
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) return alert("Enter email and password.");

            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert("Login Error: " + error.message);
            else window.location.href = "dashboard.html"; // Redirect to app
        }
    </script>
</body>
</html>
